<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifolio - Gabriel Mauss</title>
    <!--Awasome Icons para icones-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!--Google Fonts-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <!--CSS-->
    <link rel="stylesheet" href="assets/css/style.css">
    <!--Favicon-->
    <link rel="stylesheet" href="assets/images/">
</head>
<body>
    <!--Particulas de fundo-->
    <div id="particlues-js"></div>

    <!-- Cursor Personalizado -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <!-- header e navegação -->
     <header>
        <div class="logo">Portifolio - Gabriel Mauss</div>
        <button class="hamburger" aria-label="Menu">
            <i class="fas fa-bars"></i>
        </button>
        <nav>
            <ul>
                <li><a href="#home" class="nav-link">Inicio</a></li>
                <li><a href="#about" class="nav-link">Sobre</a></li>
                <li><a href="#projects" class="nav-link">Projetos</a></li>
                <li><a href="#github" class="nav-link">GitHub</a></li>
                <li><a href="#contact" class="nav-link">Contato</a></li>
                <li>
                    <button class="theme-toggle" aria-label="Aleternar tema">
                        <i class="fas fa-moon"></i>
                    </button>
                </li>
            </ul>
        </nav>
     </header>

     <main>
        <section id="home" class="hero section">
            <div class="hero-content">
                <h1>Olá, eu sou <span class="highlight">Gabriel Mauss</span></h1>
                <p class="subtitle">Estudante de Engenharia de Software</p>
                <div class="-buttons">
                    <a href="#projects" class="btn btn-primary">Ver Projetos</a>
                    <a href="assets/pdf/curriculo" download class="btn btn-secondary">Baixar CV</a>
                </div>
            </div>
        </section>

        <section id="about" class="about section">
            <h2 class="section-title">Sobre Mim</h2>
            <div class="about-content">
                <div class="about-text">
                    <p>Texto sobre mim e minha trajetoria</p>
                    <div class="skills">
                        <h3>Minhas Habilidades</h3>
                        <div class="skills-container" id="skills-container"></div>
                    </div>
                </div>
                <div class="about-image">
                    <img src="assets/images/profile" alt="Foto de Perfil" class="profile-img">
                </div>
            </div>
        </section>

        <section id="projects" class="projects section">
            <h2 class="section-title">Meus Projetos</h2>
            <div class="projects-controls">
                <div class="projects-filter">
                    <button class="filter-btn active" data-filter="all">Todos</button>
                    <button class="filter-btn" data-filter="web">WEB</button>
                    <button class="filter-btn" data-filter="mobile">MOBILE</button>
                    <button class="filter-btn" data-filter="design">DESIGN</button>
                </div>
                <div class="projects-search-container">
                    <input type="text" class="projects-search" placeholder="Buscar projetos...">
                    <i class="fas fa-search search-icon"></i>
                </div>
            </div>
            <div class="projects-grid" id="projects-grid">
            </div>
        </section>
     </main>
</body>
</html>
